# Opus 4.7 이 description 만 보고 추출한 profile 25개 — B-1 실험 데이터
#
# 방법: 각 case 의 description 만 읽고 flat profile 을 구성.
# 답지 profile 은 보지 않고 eval_ollama_rule_firing.py PROMPT_TEMPLATE
# 의 필드 사전·umbrella flag 규칙을 참고.
#
# 채점: eval_goldset.py --goldset data/eval/claude_runs/opus_goldset_v1.yaml
# 원본 25/25 대비 몇 개 pass 하는지 측정.

- id: G001_single_salary_rent
  description: |
    32살 직장인, 연봉 4,800만원. 서울 월세 55만원에 거주(무주택).
    IRP·연금저축 가입 이력 없음. 부모님 의료비 120만원 지출.
  profile:
    has_earned_income: true
    gross_salary: 48_000_000
    monthly_rent: 550_000
    is_homeless_household: true
    irp_pension: 0
    pension_savings: 0
    medical_expense: 1_200_000
  expected:
    - CRED_MONTHLY_RENT
    - DED_PENSION_IRP_700
  optional:
    - DED_CREDIT_CARD
  forbidden:
    - INH_SPOUSE_DEDUCTION
    - CORP_LOSS_CARRYFORWARD

