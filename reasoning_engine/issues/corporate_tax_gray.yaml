# 법인세 회색지대 이슈 카탈로그 v1 — Phase 7 횡확장
#
# 8이슈 커버리지:
#   부당행위(가족거래·고가매입) 2종, 임원보상(상여·퇴직금) 2종,
#   손금시기·자본화 2종, 결손·통산 1종, 일감몰아주기 1종

- id: GRAY_CORP_FAMILY_FAIR_PRICE
  title: 특수관계자 거래 정상가 산정
  scope: corporate_tax
  description: |
    법인이 대표이사·주주·관계회사와 부동산·주식·자산을 거래할 때 시가 산정 방식.
    상증법 §60 보충적평가 준용, 5% 또는 3억원 차액 기준 부당행위 판정.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - related_party_transaction: true
      - price_deviation_above: 0.05
  statutes:
    - {law: 법인세법, article: 제52조}
    - {law: 법인세법 시행령, article: 제88조}
    - {law: 상속세 및 증여세법, article: 제60조}
  ruling_spectrum: [정상가인정, 부당행위계산부인, 시가재산정]
  search_queries: [부당행위계산, 시가, 특수관계자]
  gray_reason: |
    비상장주식·미공개부동산은 시가가 명확하지 않아 보충적평가로 시가 추정.
    감정가·매매사례가 우선이나 부재 시 자산가치+수익가치 가중평균. 평가방법
    선택에 따라 5% 경계 결과 달라짐.

- id: GRAY_CORP_EXEC_BONUS_BYLAW
  title: 임원 상여금 정관·주총 한도 적격성
  scope: corporate_tax
  description: |
    정관·주주총회 결의·이사회 위임에 의한 지급기준이 있는 경우만 임원 상여 손금산입.
    정관에 "이사회 결의로 정한다"만 있고 구체 한도 없을 때 손금 인정 여부 다툼.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - executive_bonus_paid: true
      - bonus_above_bylaw_threshold: true
  statutes:
    - {law: 법인세법, article: 제26조}
    - {law: 법인세법 시행령, article: 제43조}
  ruling_spectrum: [전액손금, 한도내손금, 전액손금부인]
  search_queries: [임원상여, 정관한도, 손금부인]
  gray_reason: |
    "이사회 결의" 위임만으론 부족 — 정관에 한도금액·산정방식 명시 또는 주총
    결의 필요(예규 일관). 위임만 있으면 전액 손금부인 사례 다수.

- id: GRAY_CORP_GAJIGEUPGEUM_INTEREST
  title: 대표이사 가지급금 인정이자 산정
  scope: corporate_tax
  description: |
    법인이 대표·임원에게 무상·저리대여 시 가중평균차입이자율 또는 당좌대출이자율로
    인정이자 익금산입. 자금조달 실태에 따라 적용 이율 선택 쟁점.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - executive_loan_outstanding: true
      - interest_rate_below_market: true
  statutes:
    - {law: 법인세법, article: 제28조}
    - {law: 법인세법 시행령, article: 제89조}
  ruling_spectrum: [가중평균이자율적용, 당좌대출이자율적용, 인정이자면제]
  search_queries: [가지급금, 인정이자, 당좌대출이자율]
  gray_reason: |
    원칙은 가중평균차입이자율, 단 신청 시 당좌대출이자율(연 4.6%) 선택 가능.
    무차입 법인은 당좌대출이자율 강제 적용. 차입 일부만 있을 때 산정 다툼.

- id: GRAY_CORP_ENTERTAIN_VS_AD
  title: 접대비(기업업무추진비) vs 광고선전비 구분
  scope: corporate_tax
  description: |
    불특정 다수 대상 판촉물·견본품은 광고선전비(전액 손금), 특정 거래처 향응·선물은
    접대비(한도 규제). 1인당 5만원·연간 5만원 기준 등 실무 판정선 존재.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - promotional_expense_above: 30_000_000
  statutes:
    - {law: 법인세법, article: 제25조}
    - {law: 법인세법 시행령, article: 제42조}
    - {law: 법인세법 시행령, article: 제45조}
  ruling_spectrum: [광고선전비인정, 접대비재분류, 혼재안분]
  search_queries: [접대비, 광고선전비, 판촉물]
  gray_reason: |
    개당 3만원 이하 + 불특정 다수 + 회사 로고 표시면 광고선전비. 거래처 임직원
    한정 지급은 접대비. 경계 사례에서 명단·지급기준 유무로 판정.

- id: GRAY_CORP_RD_CAPITALIZE
  title: 연구개발비 자본화 vs 당기비용
  scope: corporate_tax
  description: |
    연구단계 지출은 당기비용, 개발단계는 자본화(무형자산). 기술적 실현가능성·경제적
    효익 기대 6요건 충족 시 자본화. 회계처리와 세무상 손금 시기 차이.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - rd_expense_above: 100_000_000
  statutes:
    - {law: 법인세법, article: 제40조}
    - {law: 법인세법 시행령, article: 제24조}
    - {law: 조세특례제한법, article: 제10조}
  ruling_spectrum: [전액당기비용, 자본화상각, 일부자본화]
  search_queries: [연구개발비, 자본화, 무형자산, 개발비, 임상]
  decisive_sources:
    - type: precedent
      precedent_id: "271960"
      사건번호: 서울행정법원-2014-구합-68188
      사건명: 개발비 회계처리가 회계기준을 위배하였다고 볼 수 없고, 자산인식요건을 충족한 것으로 볼 수 없어 손금인정됨
      선고일자: "2016.02.26"
      판결요지: |
        개발비를 무형자산(개발비 자산)으로 인식하려면 K-IFRS·일반기준상
        자산인식 6요건(기술적 실현가능성·완성 의도와 능력·미래경제효익
        기대·자원의 이용 가능성·신뢰성 있는 측정·사용 또는 판매 가능성)이
        충족되어야 한다. 일부 항목만 6요건을 충족하면 그 부분만 자본화하고,
        충족 입증이 부족한 부분은 당기비용(손금) 처리. 회계상 자본화 처리
        자체가 세무상 자산성을 강제하지 않으며, 세무조정으로 일부 손금산입
        가능. **결론은 보통 "전액 당기비용"이나 "전액 자본화"가 아니라
        사실관계에 따른 "일부 자본화·일부 손금"이 대부분.**
    - type: precedent
      precedent_id: "612551"
      사건번호: 서울고등법원-2020-누-43281
      사건명: 세액공제 대상이 되는 과학기술활동에 해당하기 위해서는 그것이 과학적 또는 불확실성을 체계적으로 해소하기 위한 활동이어야 하고, 결과의 불확실성은 연구개발활동 자체에 내재된 속성이므로 위탁연구개발의 경우 위탁자뿐만 아니라 연구개발활동을 실제로 수행하는 수탁자의 입장에서도 결과의 불확실성이 있어야 함
      선고일자: "2025.10.16"
      판결요지: |
        연구개발활동의 본질적 속성은 "결과의 불확실성". 임상 2상 단계는
        결과 불확실성이 큰 전형적 R&D 단계로 기술적 실현가능성 입증 곤란.
        따라서 자본화 6요건 일부 항목 미충족 → **당기비용 처리가 원칙**이나,
        회계상 이미 자본화한 부분 중 6요건 일부라도 충족되는 항목은 자본화
        유지. **사실관계상 "일부 자본화" 결론이 가장 많다** — 즉 회계상
        자본화 50억 전액을 강제 손금으로 보지 않고, 일부는 자본화 인정,
        일부는 당기비용으로 신고조정하는 것이 일반적.
    - type: admin_rule
      rule_id: "2100000258326"
      행정규칙명: 연구·인력개발비 세액공제 사전심사 사무처리규정
      시행일자: "2025.05.01"
      판결요지: |
        조특법 §10 R&D 세액공제 적용을 위한 사전심사 절차 규정. R&D
        지출의 적격성·자산성 판단 기준을 국세청장이 사전심사. 임상 2상
        단계 R&D는 결과 불확실성 큼 → 사전심사 통해 적격성 확인 권장.
        자본화 vs 당기비용 선택은 §10 세액공제 적용 범위와 연동.
  gray_reason: |
    K-IFRS·일반기준 자본화 6요건 판정이 주관적. 신약개발·SW 개발 단계 구분
    실무 다툼. R&D 세액공제(조특법 §10) 적용 범위와 연동되어 영향 큼.

- id: GRAY_CORP_BAD_DEBT_TIMING
  title: 대손금 손금산입 시기 판정
  scope: corporate_tax
  description: |
    채무자 파산·강제집행·소멸시효완성·6개월경과 30만원 이하 등 대손사유 발생연도에만
    손금 산입. 사유 발생 시점 판정과 회수 노력 입증 다툼.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - bad_debt_writeoff_claimed: true
  statutes:
    - {law: 법인세법, article: 제19조의2}
    - {law: 법인세법 시행령, article: 제19조의2}
  ruling_spectrum: [당해연도손금, 손금시기부인, 회수가능판정]
  search_queries: [대손금, 대손사유, 회수불능]
  gray_reason: |
    파산선고·회생계획인가는 명확하나 "회수불능 객관적 사유"는 다툼 잦음.
    소멸시효 진행 중 청구·독촉으로 시효 중단되면 대손 시기 미도래로 부인.

- id: GRAY_CORP_LOSS_CARRYOVER_MERGER
  title: 합병·분할 시 이월결손금 승계
  scope: corporate_tax
  description: |
    적격합병·분할은 피합병법인 이월결손금 승계 가능, 비적격은 소멸. 적격 요건
    (지분연속성 80%·사업계속성·고용승계 80%) 충족 여부 판정.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - merger_or_split_event: true
      - carryover_loss_exists: true
  statutes:
    - {law: 법인세법, article: 제44조}
    - {law: 법인세법, article: 제45조}
    - {law: 법인세법 시행령, article: 제80조의2}
  ruling_spectrum: [적격승계인정, 비적격결손금소멸, 부분승계]
  search_queries: [적격합병, 이월결손금, 사업계속성]
  gray_reason: |
    사후관리 3년 내 사업폐지·고용감소 80% 미달 시 사후 추징. 지분연속성은
    단순계산이나 사업계속성·고용승계는 사실관계 다툼 빈번.

- id: GRAY_CORP_THIRD_PARTY_DEEMED_GIFT
  title: 일감몰아주기 증여의제 과세
  scope: corporate_tax
  description: |
    수혜법인 매출 30%(중소기업 50%) 이상이 특수관계법인 일감 + 지배주주 직간접
    지분 3% 초과 시 지배주주에게 증여세. 정상거래비율·제외매출 산정 다툼.
  trigger_conditions:
    op: and
    of:
      - has_corporate_income
      - intercompany_sales_ratio_above: 0.30
      - controlling_shareholder_stake_above: 0.03
  statutes:
    - {law: 상속세 및 증여세법, article: 제45조의3}
    - {law: 상속세 및 증여세법 시행령, article: 제34조의3}
  ruling_spectrum: [증여의제과세, 정상거래제외인정, 과세제외사업제외]
  search_queries: [일감몰아주기, 증여의제, 정상거래비율]
  gray_reason: |
    제외매출(지주회사 배당·수출·해외매출 등) 산정 범위 다툼. 정상거래비율
    초과분만 과세이므로 분모·분자 정의에 따라 과세표준 변동.
