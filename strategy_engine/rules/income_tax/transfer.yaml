- id: TRANSFER_SELF_CULTIVATED_FARMLAND
  name: "8년 자경농지 감면 (조특 §69)"
  category: reduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_self_cultivated_farmland"
        right: true
      - op: ">="
        left: "profile.self_cultivation_years"
        right: 8
      - op: ">"
        left: "profile.transfer_gain"
        right: 0

  diagnosis: "농지 소재지 거주 + 8년 이상 자경 시 양도세 100% 감면(1억/5년 한도)"
  recommendation:
    action: "자경 증빙 확보 후 감면 신청"
    detail: "농지대장·농업경영체 등록·농산물 판매내역·거주지 주민등록 8년 연속 유지 필수. 연 500만 이상 근로·사업소득 시 자경 불인정"

  estimator:
    type: formula
    name: transfer_farmland_savings
    params:
      gain_ref: "profile.transfer_gain"

  legal_basis:
    - { law: 조세특례제한법, article: "제69조" }

  risk:
    level: medium
    flags: ["자경 입증"]
    caveat: "1과세기간당 1억, 5과세기간 2억 한도. 대토(代土)감면은 별개"

  source:
    ref: "조세특례제한법 §69"
    updated: 2026-04-14


- id: TRANSFER_PUBLIC_EXPROPRIATION
  name: "공익사업 수용 감면 (조특 §77)"
  category: reduction
  tax_type: 소득세
  priority: medium

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_public_expropriation"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0

  diagnosis: "공익사업 수용 양도 시 현금 10% / 채권 15% / 3년 이상 채권 30~40% 감면"
  recommendation:
    action: "수용 보상금 수령 방식을 채권·장기채권으로 선택"
    detail: "현금 10%, 3년 만기 채권 15%, 5년 만기 채권 30%, 7년 만기 채권 40% 감면(조특 §77의2)"

  estimator:
    type: formula
    name: transfer_expropriation_savings
    params:
      gain_ref: "profile.transfer_gain"
      compensation_type_ref: "profile.expropriation_compensation_type"

  legal_basis:
    - { law: 조세특례제한법, article: "제77조" }

  risk:
    level: low
    flags: []
    caveat: "사업인정고시일 2년 전 취득분만 적용. 1과세기간 1억/5과세기간 2억 한도"

  source:
    ref: "조세특례제한법 §77"
    updated: 2026-04-14
