# 판단 품질 골드셋 v1 — Phase 7 부가세 회색지대 6케이스
#
# 목표: ruling_match ≥ 5/6, source_match ≥ 4/6, forbidden_avoided = 6/6

- id: J201_vat_data_dealer_real_transaction
  issue_id: GRAY_VAT_FAKE_INVOICE
  description: |
    제조 도매업체. 원자재 공급자 A로부터 1억 매입(부가세 1천만), 정상 세금계산서
    수취·계좌이체·검수 완료. 6개월 후 A가 자료상으로 적발. 매입자는 A의 자료상
    여부 사전 확인 불가. 거래상대방 확인서·견적서·운송장 보유.
  profile:
    has_vat_business: true
    supplier_is_data_dealer: true
    purchase_amount: 100_000_000
    input_vat: 10_000_000
    has_real_transaction_proof: true
    has_bank_transfer: true
    has_delivery_record: true
  expected_ruling: 선의무과실인정
  expected_ruling_detail: |
    공급자가 자료상이라는 사실만으로 가공세금계산서 단정 불가. 실물거래·대금
    지급·운송 증빙이 충족되고 매입자가 사전에 자료상임을 알 수 없었으면
    선의·무과실 인정 — 매입세액 공제 유지.
  authoritative_sources:
    - type: precedent
      precedent_id: "277404"
      사건번호: 인천지방법원-2011-구합-3825
      사건명: 공급자가 자료상이라는 사실만으로 가공 또는 위장세금계산서로 단정할 수 없음
      선고일자: "2012.04.26"
    - type: statute
      law: 부가가치세법
      article: 제39조
  forbidden_reasoning:
    - 공급자가 자료상이므로 매입세액 전액 불공제
    - 세금계산서 형식만 보고 무조건 인정
  notes: |
    실물거래 입증 책임은 매입자. 통장사본·운송장·검수기록이 핵심 증빙.

- id: J202_vat_golf_membership_input
  issue_id: GRAY_VAT_INPUT_BUSINESS_RELATED
  description: |
    중견 IT 법인이 거래처 접대 전용으로 골프회원권 5억 취득. 매입세액
    5천만원 공제 신고. 용도는 100% 거래처 접대(접대비성 지출)이며 임직원
    개인 사용 없음. 부가가치세법 §39①4에 따라 접대비 관련 매입세액은
    명문으로 불공제 대상.
  profile:
    has_vat_business: true
    purchase_type: 골프회원권
    purchase_amount: 500_000_000
    input_vat: 50_000_000
    use_purpose: 영업접대
  expected_ruling: 전액불공제
  expected_ruling_detail: |
    골프회원권은 접대성 자산으로 사업 직접 관련성 부정. 부가가치세법 §39 및
    판례 일관 — 영업 목적 주장만으론 공제 부인. 매입세액 5천만 전액 불공제.
  authoritative_sources:
    - type: precedent
      precedent_id: "342430"
      사건번호: 대법원-2021-두-46810
      사건명: 사업 관련성이 없는 지출에 대한 매입세액은 매출세액에서 공제할 수 없다.
      선고일자: "2021.11.11"
    - type: precedent
      precedent_id: "298940"
      사건번호: 대법원-2016-두-42173
      사건명: 사업 관련성이 없는 지출에 대한 매입세액은 매출세액에서 공제될 수 없음
      선고일자: "2016.09.09"
    - type: statute
      law: 부가가치세법
      article: 제39조
  forbidden_reasoning:
    - 회사 명의 자산이므로 사업관련 인정
    - 영업 목적이면 공제 인정
  notes: |
    골프회원권·접대비 관련 매입세액은 명시적 불공제. 직원복지·통근버스와 구분.

- id: J203_vat_export_no_documents
  issue_id: GRAY_VAT_ZERO_RATE_PROOF
  description: |
    화장품 제조업체가 동남아 바이어에 직수출 신고 5억. 수출신고필증·외화입금
    증명서 모두 누락. 화환수표·온라인송금 내역만 제출. 영세율 신고.
  profile:
    has_vat_business: true
    zero_rate_claimed: true
    export_amount: 500_000_000
    has_export_declaration: false
    has_foreign_currency_proof: false
    has_online_payment_record: true
  expected_ruling: 영세율부인
  expected_ruling_detail: |
    영세율 적용은 표준 증빙(수출신고필증·외화입금증명서) 필수. 온라인송금
    내역만으론 외화획득 입증 부족. 영세율 부인 → 일반세율 10% 추징 + 과소
    신고가산세.
  authoritative_sources:
    - type: statute
      law: 부가가치세법
      article: 제21조
    - type: statute
      law: 부가가치세법
      article: 제24조
  forbidden_reasoning:
    - 송금 내역이 있으니 영세율 인정
    - 수출 의도가 명백하면 증빙 부족도 영세율
  notes: |
    수출신고필증이 핵심. 부재 시 외화입금증명서·계약서로 대체 입증 가능.

- id: J204_vat_mixed_use_below_5pct
  issue_id: GRAY_VAT_MIXED_USE_APPORTIONMENT
  description: |
    학원 운영 법인. 과세사업(어학원) 매출 95%, 면세사업(학습지 출판) 매출 5%.
    공통 임차료·관리비 매입세액 1억. 면세 매출 5% 이하 특례 적용 가능 여부.
  profile:
    has_vat_business: true
    mixed_taxable_exempt_business: true
    taxable_revenue_ratio: 0.95
    exempt_revenue_ratio: 0.05
    common_input_vat: 100_000_000
  expected_ruling: 매출비율안분
  expected_ruling_detail: |
    면세 매출 비율이 5%로 "5% 미만" 특례(시행령 §81) 미충족 — 매출비율 안분
    적용. 공통매입세액 1억 × 95% = 9,500만원 공제, 5%(500만원) 불공제.
  authoritative_sources:
    - type: precedent
      precedent_id: "360050"
      사건번호: 수원지방법원-2012-구합-15440
      사건명: 겸영사업자의 공통매입세액 안분공제와 정산
      선고일자: "2013.12.18"
    - type: statute
      law: 부가가치세법
      article: 제40조
    - type: statute
      law: 부가가치세법 시행령
      article: 제81조
  forbidden_reasoning:
    - 면세 5% 이하이므로 전액 공제
    - 매출비율 무시하고 사용면적만 사용
  notes: |
    "5% 미만" 특례 — 정확히 5%는 미달. 5% 초과면 전액 공제 X, 미만이면 전액 공제.

- id: J205_vat_simplified_name_split
  issue_id: GRAY_VAT_SIMPLIFIED_CONVERSION
  description: |
    배우자 명의로 같은 건물 1층·2층에 동일 업종(분식점) 매장 2개를 사실상
    하나의 사업으로 운영. 자금·인력·POS 통합, 매입처·직원 공유, 배우자는
    실제 운영에 관여하지 않고 명의만 제공(실소유자 = 본인). 각 매출 8천만
    × 2 = 1억 6천(일반과세 기준 1억 400만 초과). 본인 명의 매장만 간이과세
    신고. 국기법 §14 실질과세 원칙상 실질사업자 합산 매출 판정. 배우자
    명의는 일반과세 회피 목적의 분산으로 보아야 함.
  profile:
    has_vat_business: true
    revenue_self_name: 80_000_000
    revenue_spouse_name: 80_000_000
    same_business_type: true
    same_location: true
  expected_ruling: 명의분산부인
  expected_ruling_detail: |
    동일 사업장·동일 업종 + 가족 명의 분산 시 실질사업자(원고) 합산 매출로
    판정 — 1억 6천만 > 1억 400만 기준 초과 → 일반과세 강제 전환. 과거 신고
    분에 대해 일반과세 추징.
  authoritative_sources:
    - type: precedent
      precedent_id: "353992"
      사건번호: 서울행정법원-2012-구합-41073
      사건명: 간이과세자에서 일반과세자로 전환되는 것을 회피하기 위해 타인 명의로 사업을 한 것에 대하여 실사업자인 원고에게 한 처분은 정당함
      선고일자: "2013.08.23"
    - type: precedent
      precedent_id: "616915"
      사건번호: 서울고등법원-2025-누-6309
      사건명: 일반과세자로의 과세유형 전환시 간이과세자 적용을 받는 기간 등 관련 법률관계
      선고일자: "2025.09.26"
    - type: statute
      law: 부가가치세법
      article: 제62조
  forbidden_reasoning:
    - 사업자등록이 분리되어 있으므로 각각 간이과세
    - 배우자 명의는 별도 사업자
  notes: |
    실질과세 원칙(국기법 §14) 적용. 가족 명의 분산 회피 시도는 일관 부인.

- id: J206_vat_intermediate_invoice_recipient
  issue_id: GRAY_VAT_FALSE_INVOICE_RECIPIENT
  description: |
    유통업체가 도매상 B로부터 세금계산서 수취. 실제 공급자는 C이고 B는 명의만
    빌려준 끼워넣기 거래. 매입자는 B 사업자등록증·통장만 확인, 현장 미확인.
    매입세액 5천만 공제 신청.
  profile:
    has_vat_business: true
    invoice_facts_disputed: true
    nominal_supplier: B
    actual_supplier: C
    input_vat: 50_000_000
    confirmed_business_registration: true
    confirmed_site_visit: false
  expected_ruling: 과실인정불공제
  expected_ruling_detail: |
    공급자가 사실과 다른 사실과 다른 세금계산서. 매입자가 사업자등록증·통장만
    확인하고 현장·실거래 검증 미흡 → 과실 인정 → 매입세액 5천만 불공제 +
    가산세.
  authoritative_sources:
    - type: precedent
      precedent_id: "616845"
      사건번호: 수원고등법원-2024-누-15790
      사건명: 끼워넣기 거래의 외관을 창출하여 사실과 다른 매입세금계산서를 수취한 자의 매입세금계산서를 불공제한 이 사건 처분은 적법함
      선고일자: "2026.02.13"
    - type: precedent
      precedent_id: "616761"
      사건번호: 대구지방법원-2024-구합-22374
      사건명: 공급자가 다른 사실과 다른 세금계산서이며, 원고는 세금계산서를 수취함에 과실이 있음
      선고일자: "2026.01.15"
    - type: statute
      law: 부가가치세법
      article: 제39조
  forbidden_reasoning:
    - 사업자등록증 확인했으므로 선의 인정
    - 명의공급자 책임이므로 매입자 무관
  notes: |
    선의·무과실은 사업자등록증 확인 + 거래장소 방문 + 실제 거래상대방 식별
    노력 모두 필요.
