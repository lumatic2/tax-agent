# 판단 품질 골드셋 v1 — Phase 7 상속·증여세 회색지대 6케이스
#
# 목표: ruling_match ≥ 5/6, source_match ≥ 4/6, forbidden_avoided = 6/6

- id: J301_inh_nonlisted_stock_supplemental
  issue_id: GRAY_INH_NONLISTED_STOCK_VALUATION
  description: |
    피상속인이 보유한 비상장 제조법인 주식 100% 평가. 자산총액 200억(부동산
    50억), 직전 3년 평균 순이익 30억. 매매사례·감정가 없음. 부동산 비중
    25% (부동산과다보유법인 미해당).
  profile:
    has_inheritance_or_gift: true
    asset_type: 비상장주식
    market_price_unavailable: true
    asset_value: 20_000_000_000
    real_estate_ratio: 0.25
    avg_net_income_3y: 3_000_000_000
    is_real_estate_heavy_company: false
  expected_ruling: 보충적평가적용
  expected_ruling_detail: |
    부동산 비중 50% 미만 → 자산:수익 = 2:3 가중평균 적용. 자산가치 20,000백만 +
    수익가치(30억÷10% = 30,000백만) → (200×2 + 300×3)÷5 = 260억. 1주당 가치
    환산하여 상속세 과세표준 산정.
  authoritative_sources:
    - type: precedent
      precedent_id: "612981"
      사건번호: "2025두33647"
      사건명: 보충적 평가방법 비상장주식 시가 산정
      선고일자: "2025.10.30"
    - type: precedent
      precedent_id: "348406"
      사건번호: 대법원-2023-두-52062
      사건명: 비상장주식의 시가를 보충적 평가방법에 따라 산정한 것은 적법함
      선고일자: "2023.11.30"
    - type: statute
      law: 상속세 및 증여세법
      article: 제63조
    - type: statute
      law: 상속세 및 증여세법 시행령
      article: 제54조
  forbidden_reasoning:
    - 매매사례가 없으므로 액면가로 평가
    - 자본금만으로 평가
  notes: |
    부동산과다보유법인(부동산 50% 이상)은 자산가치만 적용. 일반은 2:3 가중평균.

- id: J302_inh_name_trust_resale
  issue_id: GRAY_INH_NAME_TRUST_DEEMED_GIFT
  description: |
    A가 비상장주식을 친구 B 명의로 명의신탁(2018년, 증여의제로 증여세 부과·
    납부 완료). 2023년 해당 주식 전량 매도. 그 매도대금 전액만을 사용해 같은
    발행회사 비상장주식을 다시 B 명의로 재취득(2024년 명의개서). 자금원천이
    이미 과세된 명의신탁 주식의 매도대금이고 수탁자도 동일인. 국세청이 재취득
    분을 재증여로 보아 증여세를 또 부과하자 A가 취소소송 제기. 핵심 쟁점:
    동일 자금·동일 명의자에 대한 중복 과세 허용 여부. 결정판례(의정부
    2024구합12806, 2025.09.30)는 "이미 증여의제로 과세되었거나 과세될 수 있는
    명의신탁 주식의 매도대금으로 취득하여 다시 동일인 명의로 명의개서된 주식에
    대해서는 다시 증여세를 과세할 수 없다"고 명시적으로 판시.
  profile:
    has_inheritance_or_gift: true
    name_trust_share_exists: true
    prior_gift_tax_paid: true
    resale_proceeds_reinvested: true
    same_nominee: true
  expected_ruling: 재증여중복과세제외
  expected_ruling_detail: |
    이미 증여의제 과세된 명의신탁 주식의 매도대금으로 동일인 명의 재취득 시
    중복 과세 제외(2025 의정부 판례). 재증여세 부과처분 취소.
  authoritative_sources:
    - type: precedent
      precedent_id: "615401"
      사건번호: 의정부지방법원-2024-구합-12806
      사건명: 증여의제 대상이 되어 과세되었거나 과세될 수 있는 명의신탁 주식의 매도대금으로 취득하여 다시 동일인 명의로 명의개서된 주식에 대해서는 다시 증여세를 과세할 수 없음
      선고일자: "2025.09.30"
    - type: statute
      law: 상속세 및 증여세법
      article: 제45조의2
  forbidden_reasoning:
    - 새로 명의개서된 주식이므로 별도 증여
    - 매도대금 = 새 자금이므로 신규 증여
  notes: |
    동일인 명의 + 매도대금 출처 동일성 입증되면 중복 과세 제외. 2025 신판례.

- id: J303_inh_family_business_employment_drop
  issue_id: GRAY_INH_FAMILY_BUSINESS_AFTER_MGMT
  description: |
    2024년 부친 사망으로 가업상속공제 300억 적용. 2026년 경기침체로 정규직
    100명 → 75명(75%)으로 감소. 사후관리 5년 중 2년차. 매출은 유지.
  profile:
    has_inheritance_or_gift: true
    family_business_deduction_applied: true
    deduction_amount: 30_000_000_000
    inheritance_year: 2024
    current_year: 2026
    initial_employment: 100
    current_employment: 75
    employment_ratio: 0.75
    revenue_maintained: true
  expected_ruling: 추징적용
  expected_ruling_detail: |
    2024년 상속분 → 사후관리 5년 적용. 고용유지 80% 미달(75%) → 사후관리
    위배. 미달 비율(5%/20%)에 비례한 추징세액 부과. 매출 유지 무관.
  authoritative_sources:
    - type: precedent
      precedent_id: "614955"
      사건번호: 수원지방법원-2024-구합-74794
      사건명: 가업상속공제의 사후관리기간 관련 청구
      선고일자: "2025.05.15"
    - type: precedent
      precedent_id: "343400"
      사건번호: 서울행정법원-2021-구합-88159
      사건명: 가업상속공제의 사후관리요건 위배 여부
      선고일자: "2023.07.20"
    - type: statute
      law: 상속세 및 증여세법
      article: 제18조
  forbidden_reasoning:
    - 매출이 유지되면 사후관리 OK
    - 고용감소가 경기 탓이면 면제
  notes: |
    고용유지·매출유지·자산처분 3중 요건 각각 판단. 1개라도 위배 시 추징.

- id: J304_inh_burden_gift_jeonse
  issue_id: GRAY_INH_DEBT_GIFT_BURDEN
  description: |
    부친이 아들에게 15억 아파트 증여. 전세보증금 8억(2년 전 모친 명의 임차)
    인수 조건. 임차인은 모친 친구. 차용증·이자 지급 내역 없음.
  profile:
    has_inheritance_or_gift: true
    asset_type: 부동산
    property_value: 1_500_000_000
    debt_amount: 800_000_000
    debt_type: 전세보증금
    lessor_relationship: 가족지인
    payment_history: false
  expected_ruling: 단순증여재구성
  expected_ruling_detail: |
    임차 진정성 의심(모친 친구·이자/원금 지급 부재) → 부담부증여 인정 불가.
    단순 증여로 재구성, 전세보증금 8억도 증여재산에 합산하여 15억 전액 증여세
    과세. 양도세 분리 효과 무효.
  authoritative_sources:
    - type: precedent
      precedent_id: "294494"
      사건번호: 대법원-2006-두-15387
      사건명: 채무를 인수한 부담부 증여로 인정할 수 있는지 여부
      선고일자: "2006.11.30"
    - type: statute
      law: 상속세 및 증여세법
      article: 제47조
  forbidden_reasoning:
    - 전세계약서가 있으므로 부담부증여 인정
    - 임대차 등기만으로 채무 진정성 인정
  notes: |
    부담부증여 진정성: 임차인 독립성·임대료 지급·시장임대료 수준이 핵심.
    가족·지인 명목 임차는 거의 부인.

- id: J305_inh_substitute_heir_prior_gift
  issue_id: GRAY_INH_PRIOR_GIFT_10Y_AGGREGATE
  description: |
    조부 사망 시 부친이 이미 사망한 상태로 손자 A가 민법 §1001 대습상속에
    의해 조부 재산을 직접 상속(대습상속인 = 상속인 지위 취득). 조부가 손자 A에게
    7년 전 5억 사전증여한 사실. 합산기간 적용 — 대습상속인은 "상속인"에 해당
    하므로 10년 합산이 적용된다는 2019 서울행정 판례 일관 입장.
  profile:
    has_inheritance_or_gift: true
    inheritance_event: true
    prior_gift_amount: 500_000_000
    years_before_inheritance: 7
    heir_type: 대습상속인
  expected_ruling: 전액합산
  expected_ruling_detail: |
    대습상속인은 상속인에 해당 → 합산기간 10년 적용. 7년 전 사전증여 5억
    상속세 과세가액에 합산. 기 납부 증여세는 상속세에서 공제(이중과세 방지).
  authoritative_sources:
    - type: precedent
      precedent_id: "329654"
      사건번호: 서울행정법원-2018-구합-63426
      사건명: 대습상속인 사전증여재산 합산기간은 10년이 되는 것임
      선고일자: "2019.03.28"
    - type: statute
      law: 상속세 및 증여세법
      article: 제13조
  forbidden_reasoning:
    - 대습상속인은 비상속인이므로 5년만 합산
    - 사전증여세 납부했으므로 상속세 합산 제외
  notes: |
    "상속인" 정의에 대습상속인 포함(민법 §1001 + 상증법 §13). 명문 판례 일관.

- id: J306_inh_free_loan_no_promissory
  issue_id: GRAY_INH_FREE_LOAN_GIFT
  description: |
    부모가 자녀에게 5억 무이자 대여(2년 전). 차용증 없음, 상환 실적 없음,
    자녀 소득 부족. 국세청이 원본 5억 자체를 증여로 재구성 시도.
  profile:
    has_inheritance_or_gift: true
    free_or_low_interest_loan: true
    loan_amount: 500_000_000
    loan_period_years: 2
    has_promissory_note: false
    has_repayment_record: false
    debtor_repayment_capacity: false
  expected_ruling: 원본증여재구성
  expected_ruling_detail: |
    차용증·이자지급·상환계획 부재 + 채무자 변제 능력 없음 → "대여" 형식
    부인. 원본 5억 자체를 증여로 재구성, 증여세 과세표준 5억 - 5천만(직계
    공제) = 4억 5천 × 20% - 1천만 = 8천만 부과.
  authoritative_sources:
    - type: precedent
      precedent_id: "271456"
      사건번호: 서울고등법원-2010-누-32244
      사건명: 금전무상대부 증여의제로 과세한 처분은 적법함
      선고일자: "2011.06.15"
    - type: precedent
      precedent_id: "273198"
      사건번호: 서울행정법원-2011-구합-17035
      사건명: 금전무상대부에 따른 이익의 증여시기는 원본이 아닌 이익을 증여받은 시기임
      선고일자: "2011.09.30"
    - type: statute
      law: 상속세 및 증여세법
      article: 제41조의4
  forbidden_reasoning:
    - 부모자식간 대여는 무조건 인정
    - 무이자라도 원본은 차용금
  notes: |
    원본 증여 재구성은 차용증·상환·변제능력 모두 부재 시. 일부라도 있으면
    이자상당액만 과세.
