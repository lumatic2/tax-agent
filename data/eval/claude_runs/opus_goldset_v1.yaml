    노란우산 미가입. 업종코드 940909.
  profile:
    has_business_income: true
    business_revenue: 120_000_000
    book_method: "단순"
    yellow_umbrella_paid: 0
  expected:
    - BOOK_DOUBLE_ENTRY_4800
    - RED_YELLOW_UMBRELLA
  forbidden:
    - CRED_RENT_MONTHLY

