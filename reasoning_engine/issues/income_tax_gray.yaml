# 소득세 회색지대 이슈 카탈로그 v1 — Phase 6 MVP
#
# 각 이슈는 strategy_engine 룰베이스로 풀 수 없는 "판단 문제":
# 조문·시행령만으로는 결론이 안 나오고, 예규·유권해석·판례 해석이 필요한 영역.
#
# 스키마:
#   id                 고유 식별자 (GRAY_*)
#   title              한글 이슈명
#   scope              해당 세목 (income_tax / corporate_tax / vat / inheritance_gift)
#   description        쟁점 한 문단 설명
#   trigger_conditions profile 상에서 이 이슈를 꺼내야 할 조건식 (DSL 간이형)
#   statutes           관련 조문 (법·영·규칙)
#   ruling_spectrum    가능한 판단 결과 (인정 / 조건부 / 불인정 / 경계)
#   search_queries     law-mcp 검색 시 쓸 키워드 후보 (짧게, phrase 미스 방지)
#   gray_reason        왜 회색지대인가 — 실무자 논쟁 지점
#
# 10이슈 커버리지:
#   필요경비 적격성 4종 (차량·가사비·접대비·기부금)
#   소득 구분 3종 (임대·기타·의제배당)
#   인적공제·증빙 2종 (부양가족·현금영수증)
#   양도 비과세 1종 (1세대 1주택)

- id: GRAY_CAR_BUSINESS_RATIO
  title: 업무용 승용차 업무사용비율 인정
  scope: income_tax
  description: |
    개인사업자가 업무용 승용차를 신고했을 때 실제 업무사용비율을 얼마나 인정할지.
    운행기록부가 있으면 실비율, 없으면 연간 1,500만원 한도만 인정되나 실무에선
    운행기록부 부실작성·사적사용 혼재 등으로 쟁점이 자주 생긴다.
  trigger_conditions:
    op: and
    of:
      - has_business_income
      - car_expense_claimed_above: 15_000_000
  statutes:
    - {law: 소득세법, article: 제33조의2}
    - {law: 소득세법 시행령, article: 제78조의3}
  ruling_spectrum: [전액인정, 한도내인정, 안분인정, 불인정]
  search_queries: [업무용승용차, 운행기록부, 사적사용]
  gray_reason: |
    운행기록부 없으면 1,500만원 한도가 원칙이나, 국세청 예규는 일부 업종(택시·렌터카·운수업)
    완화 적용. 실사용비율이 70%라도 증빙 부실하면 한도만 인정되는 사례 다수.

- id: GRAY_HOUSEHOLD_EXPENSE
  title: 자택 사업장 가사관련비 안분
  scope: income_tax
  description: |
    자택을 사업장으로 쓰는 프리랜서·1인사업자가 수도광열비·통신비·월세를
    필요경비로 얼마나 떨어뜨릴 수 있는가. 가사관련비는 원칙적으로 불산입(§33①5)이나
    업무사용면적 비율 등으로 객관적 구분 가능하면 안분 인정.
  trigger_conditions:
    op: and
    of:
      - has_business_income
      - business_location: 자택
      - household_expense_claimed: true
  statutes:
    - {law: 소득세법, article: 제33조}
    - {law: 소득세법 시행령, article: 제78조}
  ruling_spectrum: [안분인정, 불인정]
  search_queries: [가사관련비, 가사비, 필요경비]
  decisive_sources:
    - type: precedent
      precedent_id: "600303"
      사건번호: 대법원-2022-두-32382
      사건명: 종합소득세경정거부처분취소[초과인출금에 상당하는 부채의 지급이자를 가사관련경비로 정하여 필요경비에 산입하지 않도록 한 소득세법 시행령 제61조 제1항 제2호, 소득세법 시행규칙 제27조 제1항이 소득세법 제33조 제1항 제5호의 위임범위를 벗어났는지 문제 된 사건]
      선고일자: "2025.01.09"
      판결요지: |
        소득세법 §33①5의 가사관련경비는 "가사에 지출된 것이 증명된 경비"에
        한정되지 않고 사업과 무관한 것으로 추정되는 경비도 포함하나,
        "납세의무자가 그 사업관련성을 증명하면 필요경비에 산입할 수 있다"
        고 본다(추정규정 해석). 자택 사업장 가사혼합비용(관리비·전기료·
        통신비 등)은 면적비율과 같은 객관적·계측가능한 기준이 제시되면
        그 비율만큼 사업관련성이 입증된 것으로 보아 **부분 인정(안분
        인정)**해야 하며, 100% 부인은 비례원칙에 반한다. 따라서
        ruling은 "전액 부인"이 아니라 "면적비율 안분 인정"이 결론.
  gray_reason: |
    국세청 예규는 "명확한 업무비율 구분 가능 시 안분 인정"이나 실무에선 증빙
    수준이 낮아 전액 부인되는 경우가 많다. 면적비율이 가장 객관적 기준.

- id: GRAY_DONATION_ELIGIBILITY
  title: 기부금 적격성·공제 한도 구분
  scope: income_tax
  description: |
    종교단체·사회복지법인·학교·특수관계인 기부 시 법정/지정/비지정 구분이
    모호하다. 기부금영수증 발급 자격 있는 공익법인인지, 한도 내인지 판정 필요.
  trigger_conditions:
    op: and
    of:
      - donation_amount_above: 1_000_000
      - donee_type_uncertain: true
  statutes:
    - {law: 소득세법, article: 제34조}
    - {law: 소득세법 시행령, article: 제80조}
    - {law: 소득세법 시행령, article: 제81조}
  ruling_spectrum: [법정기부금인정, 지정기부금인정, 공제불인정]
  search_queries: [기부금, 지정기부금, 공익법인]
  gray_reason: |
    공익법인 등록 여부·지정기부금단체 고시 여부에 따라 한도(소득금액 10% vs 30%)
    가 갈린다. 일부 종교단체는 지정단체 지위 상실된 경우가 있어 영수증만으로
    판단 불가.

- id: GRAY_ENTERTAINMENT_VS_MEETING
  title: 접대비 vs 회의비 구분
  scope: income_tax
  description: |
    거래처 식사·선물비용이 접대비(한도 있음)인지 회의비(한도 없음)인지.
    회의비는 "업무협의 + 음식물 등 통상금액"이 인정 요건. 1인당 금액·빈도·
    장소로 실질 판단.
  trigger_conditions:
    op: and
    of:
      - has_business_income
      - entertainment_or_meeting_expense: true
  statutes:
    - {law: 소득세법, article: 제35조}
    - {law: 법인세법, article: 제25조}
    - {law: 법인세법 시행령, article: 제45조}
  ruling_spectrum: [회의비인정, 접대비인정, 혼재안분, 불인정]
  search_queries: [접대비, 회의비, 업무추진비]
  gray_reason: |
    2024년부터 법령상 "기업업무추진비"로 개칭됐으나 예규·실무는 여전히
    회의비 구분 쟁점. 1인당 3만원 기준(경조사비)·회의록 유무가 실무 판정선.

- id: GRAY_DOUBLE_CASH_RECEIPT
  title: 현금영수증 의무발행업종 미발행 가산세
  scope: income_tax
  description: |
    의무발행업종이 10만원 이상 현금거래 시 현금영수증 미발행하면 공급가액 20%
    가산세. 단 거래처·개인 구분이 모호하거나 사후 자진발급한 경우 감면 여부.
  trigger_conditions:
    op: and
    of:
      - has_business_income
      - is_cash_receipt_mandatory_industry: true
      - cash_transaction_above_100k: true
  statutes:
    - {law: 소득세법, article: 제162조의3}
    - {law: 조세특례제한법, article: 제126조의3}
  ruling_spectrum: [가산세면제, 감면적용, 전액부과]
  search_queries: [현금영수증, 의무발행, 미발급가산세]
  gray_reason: |
    5일 내 자진발급 시 가산세 50% 감면 등 경감 규정이 있지만, 거래상대방이
    법인·개인 혼재한 경우 판정 기준이 예규로만 정리됨.

- id: GRAY_RENTAL_VS_BUSINESS
  title: 주택임대 사업소득 vs 부동산임대업 구분
  scope: income_tax
  description: |
    오피스텔·도시형생활주택을 임대할 때 "주택임대업(분리과세 가능)"인지
    "일반 부동산임대업(종합과세)"인지. 임차인 사용실태·건축물대장 용도·
    실제 거주 가능성이 판단 요소.
  trigger_conditions:
    op: and
    of:
      - has_rental_income
      - property_type_uncertain: true
  statutes:
    - {law: 소득세법, article: 제19조}
    - {law: 소득세법, article: 제45조의3}
    - {law: 소득세법 시행령, article: 제122조의2}
  ruling_spectrum: [주택임대인정, 부동산임대로분류, 혼재안분]
  search_queries: [주택임대, 오피스텔, 주거용]
  gray_reason: |
    오피스텔은 건축물대장 용도(업무시설)와 실사용(주거) 불일치가 잦음.
    예규는 "실제 주거용도 사용 시 주택임대" 입장이나 사실관계 판단.

- id: GRAY_DEPENDENT_QUALIFICATION
  title: 부양가족 기본공제 소득요건
  scope: income_tax
  description: |
    부양가족의 연간 소득금액 100만원(근로소득만 있을 경우 500만원) 초과 여부.
    일용근로·기타소득·사업소득 혼재 시 소득금액 계산에 다툼. 비과세 항목
    포함 여부도 쟁점.
  trigger_conditions:
    op: and
    of:
      - has_earned_income
      - has_dependent_with_income: true
  statutes:
    - {law: 소득세법, article: 제50조}
    - {law: 소득세법 시행령, article: 제106조}
  ruling_spectrum: [공제인정, 공제부인, 조건부인정]
  search_queries: [부양가족, 기본공제, 소득요건, 퇴직소득, 근속연수공제]
  decisive_sources:
    - type: precedent
      precedent_id: "333702"
      사건번호: 부산지방법원-2017-구합-22603
      사건명: 퇴직소득공제 계산시 근속연수는 입사일 부터 희망퇴직일까지임
      선고일자: "2018.07.06"
      판결요지: |
        소득세법 §48 퇴직소득금액 = 퇴직급여 - 퇴직소득공제(근속연수공제 +
        환산급여공제). **근속연수공제 산식(§48 별표·시행령)**: 5년 이하
        구간은 "100만원 × 근속연수". 따라서 근속 5년의 근속연수공제는
        100만원 × 5 = **500만원**(0.5천만 = ₩5,000,000). 환산급여공제는
        근속연수가 짧으면 미미함.

        **계산 예**: 퇴직급여 3,000만원 + 근속 5년 → 퇴직소득금액 ≈
        3,000만 - 500만 = **2,500만원**. 이는 §50 "연간 소득금액 합계액
        100만원" 기준을 **현저히 초과**.

        **판단 결론**: §50 부양가족 기본공제의 "연간 소득금액 합계액 100만원
        이하" 요건은 종합과세·분류과세·합산과세 여부와 **무관하게** 모든
        과세 소득금액을 포함한다(퇴직소득은 분류과세이지만 소득금액 산정에
        포함됨에 주의). 배우자 퇴직소득금액 2,500만원 > 100만원 →
        ruling: **공제부인**.

        **대조군**: 동일 퇴직급여 3,000만이라도 근속 20년이면 근속연수공제
        4,000만(20년 누적)이 퇴직급여를 초과해 퇴직소득금액 0원 → 인정.
        근속연수가 짧을수록 부인 결과.
  gray_reason: |
    부양가족이 일용근로 + 복권당첨금 + 금융소득 분리과세 보유 시 "소득금액
    100만원" 판정에 비과세·분리과세 합산 여부 해석차. 예규 반복 정리됨.

- id: GRAY_DEEMED_DIVIDEND
  title: 감자·해산 시 의제배당 평가
  scope: income_tax
  description: |
    비상장법인 감자·해산·합병 시 주주가 받는 대가 중 주식취득가액 초과분은
    의제배당. 감자대가의 시가·취득가액 산정, 주식평가 방식이 쟁점.
  trigger_conditions:
    op: and
    of:
      - has_dividend_income
      - corporate_event: [감자, 해산, 합병, 분할]
  statutes:
    - {law: 소득세법, article: 제17조}
    - {law: 소득세법 시행령, article: 제27조}
  ruling_spectrum: [의제배당과세, 양도소득분류, 과세제외]
  search_queries: [의제배당, 감자, 자본환원]
  gray_reason: |
    비상장주식 시가 산정에 상증법 보충적평가 준용. 특수관계자 거래 시 부당
    행위계산부인도 중첩 적용되어 과세표준이 엇갈림.

- id: GRAY_OTHER_INCOME_VS_BUSINESS
  title: 일시적 용역 기타소득 vs 사업소득
  scope: income_tax
  description: |
    강연료·원고료·자문료가 "계속·반복성"을 갖추면 사업소득, 일시적이면
    기타소득(필요경비 60~80% 의제, 300만 이하 분리과세). 빈도·금액·계약형태가
    판정 기준.
  trigger_conditions:
    op: and
    of:
      - has_irregular_income
      - income_nature_uncertain: true
  statutes:
    - {law: 소득세법, article: 제19조}
    - {law: 소득세법, article: 제21조}
    - {law: 소득세법 시행령, article: 제87조}
  ruling_spectrum: [기타소득인정, 사업소득재분류, 근로소득판정]
  search_queries: [기타소득, 강연료, 계속반복]
  gray_reason: |
    연간 4회 이상 + 총 500만 초과 등 구체 기준은 예규로만 제시됨. 같은
    강연료라도 교수직 본업자는 근로·기타, 전업강사는 사업소득 해석례 다수.

- id: GRAY_ONE_HOUSE_TRANSFER_NONTAXABLE
  title: 1세대 1주택 양도 비과세 요건
  scope: income_tax
  description: |
    조정대상지역 2년 거주요건, 일시적 2주택(신규 취득 후 3년 내 종전주택 양도),
    세대 분리 시점, 상속주택 특례 등 비과세 요건 다층 조합.
