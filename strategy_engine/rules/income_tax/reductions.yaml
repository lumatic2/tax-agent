- id: RED_SME_EMPLOYMENT
  name: "중소기업취업자 소득세 감면"
  category: reduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_earned_income"
        right: true
      - op: "=="
        left: "profile.is_sme_employee"
        right: true
      - op: "<="
        left: "profile.sme_years_employed"
        right: 5.0

  diagnosis: "중소기업 취업자 — 청년(15~34) 5년간 90%, 장애인·경력단절여성·고령자 3년간 70% 소득세 감면(한도 연 200만)"
  recommendation:
    action: "중소기업취업자 감면 신청"
    detail: "취업일 기준 감면기간 산정. 회사 원천징수 단계에서 신청서 제출"

  estimator:
    type: formula
    name: sme_employment_reduction_savings
    params:
      worker_type_ref: "profile.sme_worker_type"
      years_employed_ref: "profile.sme_years_employed"
      gross_salary_ref: "profile.gross_salary"

  legal_basis:
    - { law: 조세특례제한법, article: "제30조" }

  risk:
    level: low
    flags: []
    caveat: "중소기업 업종 제외(금융·보험·유흥 등) 확인 필요"

  source:
    ref: "삼쩜삼 종소세 절세 9가지"
    updated: 2026-04-14


- id: RED_YELLOW_UMBRELLA
  name: "노란우산공제 (소기업·소상공인)"
  category: reduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_business_income"
        right: true
      - op: "<"
        left: "profile.yellow_umbrella_paid"
        right: 5000000

  diagnosis: "소기업·소상공인 공제부금 납입액 소득공제 — 연 200~500만 한도(사업소득 규모별)"
  recommendation:
    action: "노란우산 가입 또는 추가 납입"
    detail: "폐업·노령·사망 시 공제금 수령. 중도해지 불이익 있으므로 가입 후 유지 필수"

  estimator:
    type: formula
    name: yellow_umbrella_savings
    params:
      paid_ref: "profile.yellow_umbrella_paid"
      marginal_rate_ref: "profile.marginal_rate"

  legal_basis:
    - { law: 조세특례제한법, article: "제86조의3" }

  risk:
    level: medium
    flags: []
    caveat: "중도해지 시 기타소득으로 과세(16.5% 또는 종합과세)"

  source:
    ref: "세이브택스 개인사업자 절세 팁 6가지"
    updated: 2026-04-14


- id: RED_SME_SPECIAL_SECTION7
  name: "중소기업 특별세액감면 (조특 §7)"
  category: reduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_business_income"
        right: true
      - op: "=="
        left: "profile.is_sme_business"
        right: true

  diagnosis: "중소기업 특별세액감면 — 업종·규모·소재지별 5~30% 감면, 연 1억 한도"
  recommendation:
    action: "종합소득세 신고 시 세액감면 신청서 제출"
    detail: "감면율은 업종(제조/도소매·의료/지식기반/기타) × 규모(소/중) × 소재지(수도권/비수도권) 조합으로 결정"

  estimator:
    type: formula
    name: sme_special_reduction_savings
    params:
      business_income_ref: "profile.business_income"
      size_ref: "profile.sme_size"
      region_ref: "profile.sme_region"
      industry_ref: "profile.sme_industry"

  legal_basis:
    - { law: 조세특례제한법, article: "제7조" }

  risk:
    level: low
    flags: []
    caveat: "중소기업 기준(매출·자산·종업원수) 매년 점검. 창업중소기업(§6) 감면과 중복적용 불가"

  source:
    ref: "조특법 §7 — 2026 개정 기준"
    updated: 2026-04-17
