# 세무사 검토 골드셋 v1 — PRD "80% 일치" 측정용 기준 데이터
#
# 각 항목:
#   id           고유 식별자
#   description  사용자 자연어 질문 (Phase 2 UX 모사)
#   profile      strategy_engine 입력 flat profile (사람 검증본)
#   expected     세무사 검토 결과 기준 — 반드시 제안되어야 할 규칙 id
#   optional     제안되면 좋지만 감점 없는 규칙 id
#   forbidden    제안되면 안 되는 규칙 id (오탐 방지)
#   notes        세무사 코멘트·법령 근거
#
# 채점기(eval_goldset.py) 는 strategy_engine.run() 결과 vs expected 를 비교해
# 케이스별 pass/fail + 전체 accuracy 산출. PRD 목표 ≥ 0.80.

