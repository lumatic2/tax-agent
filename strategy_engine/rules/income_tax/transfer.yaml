# 양도소득세 전략 규칙 (Phase 7)
# 소득세법 §89·§94·§95·§104, 조세특례제한법 §69·§77
# 양도세율은 진행 단순화를 위해 평균 20%로 가정 (기본세율 6~45% 중간값)

# ============================================================
# Phase 7.1 — 양도차익 기본 계산
# ============================================================

- id: TRANSFER_ACQUISITION_DOC
  name: "실지거래가액 입증자료 확보"
  category: deduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_transfer_income"
        right: true
      - op: "=="
        left: "profile.acquisition_docs_available"
        right: false
      - op: ">"
        left: "profile.acquisition_value_gap"
        right: 0

  diagnosis: "취득가액 입증자료 부재 시 환산취득가액으로 산정되어 취득가액이 과소 계상됨. 계약서·영수증 확보 시 양도차익 감소"
  recommendation:
    action: "취득 당시 계약서·영수증·등기부 확보"
    detail: "실지거래가액 > 환산가액인 경우 차액만큼 양도차익 축소. 5% 가산세(조특) 별도 절감"

  estimator:
    type: formula
    name: transfer_basic_savings
    params:
      base_ref: "profile.acquisition_value_gap"

  legal_basis:
    - { law: 소득세법, article: "제97조" }

  risk:
    level: low
    flags: []
    caveat: "입증자료는 금융거래 내역·등기부등본 등 객관적 증빙 필요"

  source:
    ref: "국세청 양도소득세 실무"
    updated: 2026-04-14


- id: TRANSFER_NECESSARY_EXPENSE
  name: "필요경비 가산 누락분 반영"
  category: deduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_transfer_income"
        right: true
      - op: ">"
        left: "profile.unreported_necessary_expense"
        right: 0

  diagnosis: "중개수수료·법무사비·취득세·자본적지출·양도비용 중 누락분 존재. 필요경비 가산 시 양도차익 감소"
  recommendation:
    action: "필요경비 증빙 수집 및 신고서 반영"
    detail: "중개수수료·법무사·취득세는 취득가액 가산, 자본적지출(발코니 확장·샷시 등)은 필요경비, 양도비용(중개수수료)은 양도가액 차감"

  estimator:
    type: formula
    name: transfer_basic_savings
    params:
      base_ref: "profile.unreported_necessary_expense"

  legal_basis:
    - { law: 소득세법, article: "제97조" }

  risk:
    level: low
    flags: []
    caveat: "자본적지출은 건물 가치 증가분만 인정. 수익적지출(도배·장판)은 필요경비 불인정"

  source:
    ref: "국세청 양도소득세 실무"
    updated: 2026-04-14


- id: TRANSFER_GIFT_CARRYOVER
  name: "배우자·직계존비속 증여 후 10년 이월과세 주의"
  category: timing
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_post_gift_transfer"
        right: true
      - op: "<"
        left: "profile.years_since_gift"
        right: 10
      - op: ">"
        left: "profile.gift_carryover_gain"
        right: 0

  diagnosis: "배우자·직계존비속 증여 후 10년 이내 양도 시 이월과세(증여자 취득가액 기준) 적용. 10년 경과 후 양도 시 수증자 취득가액으로 step-up"
  recommendation:
    action: "10년 경과 후 양도하거나 이월과세 부담 비교"
    detail: "이월과세 적용 시 양도세가 증여세보다 크면 증여세 환급. 10년 대기 가능 시 step-up 효과로 양도차익 대폭 감소"

  estimator:
    type: formula
    name: transfer_basic_savings
    params:
      base_ref: "profile.gift_carryover_gain"

  legal_basis:
    - { law: 소득세법, article: "제97조의2" }

  risk:
    level: medium
    flags: ["이월과세"]
    caveat: "2023년 이후 증여분부터 5년→10년 강화. 배우자·직계존비속 한정"

  source:
    ref: "소득세법 §97의2 (2023 개정)"
    updated: 2026-04-14


# ============================================================
# Phase 7.2 — 장기보유특별공제
# ============================================================

- id: TRANSFER_LTCG_TABLE1
  name: "장기보유특별공제 표1 (일반 자산)"
  category: timing
  tax_type: 소득세
  priority: medium

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_transfer_income"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0
      - op: ">="
        left: "profile.holding_years"
        right: 3
      - op: "<"
        left: "profile.holding_years"
        right: 15

  diagnosis: "일반 부동산 3년 이상 보유 시 장특공제 표1 적용(3년 6%→15년 30%, 연 2%p). 보유기간 연장 시 공제율 상승"
  recommendation:
    action: "매도 시점을 보유 만기에 맞춰 조정"
    detail: "1년 연장 시 양도차익의 2%p 추가 공제. 15년 보유 시 최대 30%"

  estimator:
    type: formula
    name: transfer_ltcg_table1_savings
    params:
      gain_ref: "profile.transfer_gain"
      current_years_ref: "profile.holding_years"

  legal_basis:
    - { law: 소득세법, article: "제95조" }

  risk:
    level: low
    flags: []
    caveat: "미등기·단기보유(3년 미만) 배제. 조정대상지역 다주택 중과 시 배제"

  source:
    ref: "소득세법 §95 표1"
    updated: 2026-04-14


- id: TRANSFER_LTCG_TABLE2_ONE_HOUSE
  name: "장기보유특별공제 표2 (1세대 1주택 거주요건 보강)"
  category: deduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_one_house"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0
      - op: ">="
        left: "profile.holding_years"
        right: 3
      - op: "<"
        left: "profile.residence_years"
        right: 10

  diagnosis: "1세대 1주택 장특공제 표2는 보유 4%+거주 4% 연 합산 최대 80%. 거주기간 추가 확보 시 공제율 대폭 상승"
  recommendation:
    action: "거주기간을 양도 전 추가 확보"
    detail: "보유 10년+거주 10년 시 80% 공제. 거주 1년당 4%p 추가"

  estimator:
    type: formula
    name: transfer_ltcg_table2_savings
    params:
      gain_ref: "profile.transfer_gain"
      holding_years_ref: "profile.holding_years"
      residence_years_ref: "profile.residence_years"

  legal_basis:
    - { law: 소득세법, article: "제95조" }

  risk:
    level: low
    flags: []
    caveat: "2020년 이후 양도분부터 거주요건 필수. 미거주 시 표1 적용"

  source:
    ref: "소득세법 §95 표2"
    updated: 2026-04-14


# ============================================================
# Phase 7.3 — 1세대 1주택 비과세
# ============================================================

- id: TRANSFER_ONE_HOUSE_EXEMPT
  name: "1세대 1주택 비과세 요건 충족"
  category: reduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_one_house"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0
      - op: "<="
        left: "profile.transfer_price"
        right: 1200000000

  diagnosis: "1세대 1주택 + 2년 이상 보유(조정대상지역 2년 거주) + 12억 이하 양도 시 전액 비과세"
  recommendation:
    action: "요건 미달 시 보유·거주기간 추가 확보"
    detail: "12억 이하 1세대 1주택은 양도세 전액 비과세(소득 §89). 12억 초과분만 과세"

  estimator:
    type: formula
    name: transfer_basic_savings
    params:
      base_ref: "profile.transfer_gain"

  legal_basis:
    - { law: 소득세법, article: "제89조" }

  risk:
    level: low
    flags: []
    caveat: "조정대상지역(2017.8.3 이후 취득) 2년 거주 필수. 일시적 2주택 특례는 별도 규칙 참조"

  source:
    ref: "소득세법 §89, 시행령 §154"
    updated: 2026-04-14


- id: TRANSFER_TEMP_TWO_HOUSE
  name: "일시적 2주택 종전주택 3년 내 양도 특례"
  category: timing
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_temp_two_house"
        right: true
      - op: "<="
        left: "profile.months_since_new_house"
        right: 36
      - op: ">"
        left: "profile.old_house_gain"
        right: 0

  diagnosis: "신규주택 취득 후 3년 내 종전주택 양도 시 1세대 1주택 비과세 적용(일시적 2주택 특례)"
  recommendation:
    action: "신규주택 취득일로부터 3년 내 종전주택 양도"
    detail: "종전주택 2년 이상 보유·거주 + 신규주택 취득 1년 경과 후 + 3년 내 양도 모두 충족 필수"

  estimator:
    type: formula
    name: transfer_basic_savings
    params:
      base_ref: "profile.old_house_gain"

  legal_basis:
    - { law: 소득세법 시행령, article: "제155조" }

  risk:
    level: medium
    flags: ["3년 기한"]
    caveat: "2022.5.10 이후 모든 지역 3년 일괄 적용. 2023 이전 조정지역 2년이었음"

  source:
    ref: "소득세법 시행령 §155"
    updated: 2026-04-14


- id: TRANSFER_INHERITED_HOUSE
  name: "상속주택 중복 보유 시 일반주택 비과세"
  category: reduction
  tax_type: 소득세
  priority: medium

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_inherited_house"
        right: true
      - op: "=="
        left: "profile.selling_ordinary_house"
        right: true
      - op: ">"
        left: "profile.ordinary_house_gain"
        right: 0

  diagnosis: "상속주택 + 일반주택 2주택 상태에서 일반주택 양도 시 1세대 1주택 비과세 적용(상속주택은 주택 수에서 제외)"
  recommendation:
    action: "일반주택 양도 우선, 상속주택 보유 유지"
    detail: "피상속인 사망일 전 보유 중이던 일반주택에 한함. 상속 후 취득한 주택은 적용 제외"

  estimator:
    type: formula
    name: transfer_basic_savings
    params:
      base_ref: "profile.ordinary_house_gain"

  legal_basis:
    - { law: 소득세법 시행령, article: "제155조 제2항" }

  risk:
    level: low
    flags: []
    caveat: "공동상속 시 지분 40% 이하여야 주택 수 제외. 상속 개시 후 취득한 일반주택은 불인정"

  source:
    ref: "소득세법 시행령 §155 ②"
    updated: 2026-04-14


- id: TRANSFER_HIGH_VALUE_EXCESS_LTCG
  name: "12억 초과 1세대 1주택 — 과세분 장특공제 극대화"
  category: deduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_one_house"
        right: true
      - op: ">"
        left: "profile.transfer_price"
        right: 1200000000
      - op: ">"
        left: "profile.transfer_gain"
        right: 0

  diagnosis: "12억 초과 1세대 1주택은 초과분만 과세. 장특공제 표2(최대 80%) 거주·보유기간 극대화로 과세분 대폭 축소"
  recommendation:
    action: "거주·보유 각 10년 확보 후 양도"
    detail: "과세 양도차익 = 전체 차익 × (양도가액 - 12억) / 양도가액. 장특공제 80% 적용 시 과세표준 20%까지 축소"

  estimator:
    type: formula
    name: transfer_high_value_excess_savings
    params:
      gain_ref: "profile.transfer_gain"
      price_ref: "profile.transfer_price"
      holding_years_ref: "profile.holding_years"
      residence_years_ref: "profile.residence_years"

  legal_basis:
    - { law: 소득세법, article: "제89조 제1항 제3호, 제95조" }

  risk:
    level: low
    flags: []
    caveat: "2021.12.8 이후 양도분부터 12억 기준(이전 9억). 거주요건 미충족 시 표1 적용"

  source:
    ref: "소득세법 §89·§95"
    updated: 2026-04-14


# ============================================================
# Phase 7.4 — 세율 및 중과
# ============================================================

- id: TRANSFER_SHORT_TERM_EXTEND
  name: "단기양도 세율 회피 — 보유기간 2년 확보"
  category: timing
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.has_transfer_income"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0
      - op: "<"
        left: "profile.holding_months"
        right: 24

  diagnosis: "주택 1년 미만 70% / 2년 미만 60% 단기양도세율. 2년 경과 시 기본세율(6~45%) 적용으로 세부담 대폭 감소"
  recommendation:
    action: "매도 시점을 보유 2년 이후로 조정"
    detail: "1년 경과 시 60%, 2년 경과 시 기본세율. 보유기간 = 취득일~양도일"

  estimator:
    type: formula
    name: transfer_short_term_savings
    params:
      gain_ref: "profile.transfer_gain"
      current_months_ref: "profile.holding_months"

  legal_basis:
    - { law: 소득세법, article: "제104조 제1항" }

  risk:
    level: low
    flags: ["단기보유"]
    caveat: "분양권은 1년 미만 70% / 1년 이상 60%. 주택 외 자산(토지·건물)은 1년 미만 50% / 2년 미만 40%"

  source:
    ref: "소득세법 §104"
    updated: 2026-04-14


- id: TRANSFER_UNREGISTERED_AVOID
  name: "미등기 양도 70% 세율 회피 — 등기 완료"
  category: reduction
  tax_type: 소득세
  priority: high

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_unregistered_transfer"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0

  diagnosis: "미등기 양도자산은 70% 세율 + 장특공제·비과세 전면 배제. 등기 완료 시 기본세율(6~45%) 적용"
  recommendation:
    action: "양도 전 소유권 이전등기 완료"
    detail: "등기 완료 후 양도 시 단기세율(1년 미만 70%, 2년 미만 60%) 또는 기본세율 적용 가능"

  estimator:
    type: formula
    name: transfer_unregistered_savings
    params:
      gain_ref: "profile.transfer_gain"

  legal_basis:
    - { law: 소득세법, article: "제104조 제1항 제10호" }

  risk:
    level: high
    flags: ["미등기"]
    caveat: "장특공제·비과세 배제. 장기보유시도 30% 공제 불가. 등기 의무 위반 시 과태료 별도"

  source:
    ref: "소득세법 §104 ①10"
    updated: 2026-04-14


- id: TRANSFER_MULTI_HOUSE_DEFER
  name: "다주택 중과세율 유예기간 활용"
  category: timing
  tax_type: 소득세
  priority: medium

  applies_when:
    op: and
    of:
      - op: "=="
        left: "profile.is_multi_house_heavy_zone"
        right: true
      - op: ">"
        left: "profile.transfer_gain"
        right: 0
      - op: "=="
        left: "profile.multi_house_defer_active"
        right: true

  diagnosis: "조정대상지역 2주택자 +20%p / 3주택 이상 +30%p 중과. 현재 유예기간 한정 기본세율 적용 가능"
  recommendation:
    action: "유예기간 내 양도 실행"
    detail: "2022.5.10 이후 다주택 중과 한시 유예(연장 지속). 최근 시행령 기준 양도시점 확인 필수"

  estimator:
    type: formula
    name: transfer_multi_house_savings
    params:
      gain_ref: "profile.transfer_gain"
      surcharge_ref: "profile.multi_house_surcharge_rate"

  legal_basis:
    - { law: 소득세법, article: "제104조 제7항" }

  risk:
    level: high
    flags: ["다주택 중과", "유예기간 한시"]
    caveat: "유예기간 연장 여부 매년 시행령 확인 필수. 종료 시 중과세율 즉시 복원"

  source:
    ref: "소득세법 §104 ⑦"
    updated: 2026-04-14


